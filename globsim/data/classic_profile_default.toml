[sw]
input = "SW_sur"
scale_factor = 1
offset = 0
output_file = "metVar_sw.nc"
units = "W m-2"
long_name = "Incoming shortwave radiation"
title = "Incoming short wave radiation"

[lw]
input = "LW_sur"
scale_factor = 1
offset = 0
output_file = "metVar_lw.nc"
units = "W m-2"
long_name = "Incoming longwave radiation"
title = "Incoming long wave radiation"

[pr]
input = "PREC_sur"
scale_factor = 1
offset = 0
output_file = "metVar_pr.nc"
units = "kg m-2 s-1"
long_name = "Precipitation rate"
title = "Total precipitation"

[ta]
input = "AIRT_sur"
scale_factor = 1
offset = 0
output_file = "metVar_ta.nc"
units = "degrees_C"
long_name = "Air temperature"
title = "Temperature"

[qa]
input = "SH_sur"
scale_factor = 1
offset = 0
output_file = "metVar_qa.nc"
units = "kg kg-1"
long_name = "Specific humidity"
title = "Air specific humidity"

[wi]
input = "WSPD_sur"
scale_factor = 1
offset = 0
output_file = "metVar_wi.nc"
units = "m s-1"
